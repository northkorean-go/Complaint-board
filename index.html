<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZARA 건의사항</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="user-wrapper">
    <div class="user-box">
      <h1 class="user-title">SUGGESTION BOX</h1>

      <div class="type-select">
        <button class="type-btn active" data-type="건의사항">건의사항</button>
        <button class="type-btn" data-type="불만사항">불만사항</button>
      </div>

      <textarea
        id="content"
        placeholder="건의사항 또는 불만사항을 입력해주세요"
        class="user-textarea"
      ></textarea>

      <button id="submitBtn" class="submit-btn">등록하기</button>
    </div>

    <div class="list-box">
      <h2>최근 접수</h2>
      <div id="postList"></div>
    </div>
  </div>

  <script>
    let selectedType = "건의사항";

    const typeButtons = document.querySelectorAll(".type-btn");

    typeButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        typeButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedType = btn.dataset.type;
      });
    });

    document.getElementById("submitBtn").addEventListener("click", async () => {
      const content = document.getElementById("content").value.trim();

      if (!content) {
        alert("내용을 입력해주세요");
        return;
      }

      try {
        const res = await fetch("/api/post", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            type: selectedType,
            content
          }),
        });

        if (!res.ok) throw new Error();

        document.getElementById("content").value = "";
        loadPosts();
        alert("등록 완료!");
      } catch {
        alert("서버 오류");
      }
    });

    async function loadPosts() {
      try {
        const res = await fetch("/api/posts");
        const posts = await res.json();

        const list = document.getElementById("postList");

        if (!posts.length) {
          list.innerHTML = "<p>등록된 글이 없습니다.</p>";
          return;
        }

        list.innerHTML = posts.map(p => `
          <div class="post-item">
            <div class="post-type">${p.type}</div>
            <div class="post-content">${p.content}</div>
            <div class="post-date">${p.created_at || p.date}</div>
          </div>
        `).join("");
      } catch {
        document.getElementById("postList").innerHTML = "불러오기 실패";
      }
    }

    loadPosts();
  </script>

  <style>
    .user-wrapper {
      max-width: 600px;
      margin: 40px auto;
    }

    .user-box {
      background: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .user-title {
      text-align: center;
      margin-bottom: 20px;
    }

    .type-select {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .type-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      background: #eee;
    }

    .type-btn.active {
      background: black;
      color: white;
    }

    .user-textarea {
      width: 100%;
      height: 100px;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .submit-btn {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: black;
      color: white;
      border-radius: 8px;
    }

    .list-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    .post-item {
      border-bottom: 1px solid #eee;
      padding: 10px 0;
    }

    .post-type {
      font-weight: bold;
    }

    .post-date {
      font-size: 12px;
      color: gray;
    }
  </style>
</body>
</html>
