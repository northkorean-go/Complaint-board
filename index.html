<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZARA 건의사항</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="zara-shell">
    <header class="zara-topbar">
      <div class="zara-topbar-inner">
        <div class="zara-topbar-title">ZARA 건의사항</div>
        <div class="zara-topbar-switch">
          <button class="top-switch-btn active" type="button">사용자 화면</button>
          <button
            class="top-switch-btn"
            type="button"
            onclick="location.href='/login.html'"
          >
            관리자 화면
          </button>
        </div>
      </div>
    </header>

    <main class="zara-main">
      <section class="zara-card zara-form-card">
        <div class="zara-eyebrow">ZARA</div>
        <h1 class="zara-hero-title">SUGGESTION BOX</h1>
        <p class="zara-hero-desc">
          운영진도 작성자를 확인할 수 없는 익명 방식으로 운영되니 자유롭게 남겨주세요.
        </p>

        <div class="zara-section-label">접수 유형 선택</div>

        <div class="zara-type-grid">
          <button class="zara-type-btn active" type="button" data-type="건의사항">
            <span class="zara-type-title">건의사항</span>
            <span class="zara-type-desc">부담 없이 자유롭게 건의해주세요.</span>
          </button>

          <button class="zara-type-btn" type="button" data-type="불만사항">
            <span class="zara-type-title">불만사항</span>
            <span class="zara-type-desc">불편했던 점, 개선이 필요한 문제 관련 불만 사항을 자유롭게 남겨주세요.</span>
          </button>
        </div>

        <div class="zara-section-label" id="formLabel">ZARA 건의사항</div>

        <textarea
          id="content"
          class="zara-textarea"
          placeholder="자유롭게 건의해주세요."
        ></textarea>

        <div class="zara-form-footer">
          <div class="zara-form-note">익명으로 접수되며, 관리자만 관리할 수 있습니다.</div>
          <button id="submitBtn" class="zara-submit-btn" type="button">등록하기</button>
        </div>
      </section>

      <section class="zara-card zara-board-card">
        <div class="zara-board-head">
          <div>
            <div class="zara-eyebrow">LIVE BOARD</div>
            <h2 class="zara-board-title">최근 건의사항</h2>
          </div>
          <button class="zara-search-btn" type="button">검색</button>
        </div>

        <div id="postList" class="zara-post-list">
          <div class="zara-empty-post">불러오는 중입니다.</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    let selectedType = "건의사항";

    const typeButtons = document.querySelectorAll(".zara-type-btn");
    const formLabel = document.getElementById("formLabel");
    const textarea = document.getElementById("content");
    const submitBtn = document.getElementById("submitBtn");
    const postList = document.getElementById("postList");

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function updateTypeUI(type) {
      selectedType = type;

      typeButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.type === type);
      });

      if (type === "불만사항") {
        formLabel.textContent = "ZARA 불만사항";
        textarea.placeholder = "자유롭게 불만사항을 남겨주세요.";
      } else {
        formLabel.textContent = "ZARA 건의사항";
        textarea.placeholder = "자유롭게 건의해주세요.";
      }
    }

    typeButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        updateTypeUI(btn.dataset.type);
      });
    });

    function normalizePosts(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data.posts)) return data.posts;
      return [];
    }

    function renderPosts(posts) {
      if (!posts.length) {
        postList.innerHTML = '<div class="zara-empty-post">아직 등록된 글이 없습니다.</div>';
        return;
      }

      postList.innerHTML = posts.slice(0, 3).map((post) => {
        const type = post.type || "건의사항";
        const isComplaint = type.includes("불만");
        const status = post.status || (post.comment ? "처리중" : "보류");
        const content = post.content || post.title || "";
        const dateText = post.date || post.created_at || "-";
        const id = post.id ?? "-";

        return `
          <article class="zara-post-card">
            <div class="zara-post-top">
              <div class="zara-post-top-left">
                <span class="zara-post-no">NO. ${id}</span>
                <span class="zara-chip ${isComplaint ? "dark" : ""}">${escapeHtml(type)}</span>
                <span class="zara-chip ${status === "처리중" ? "dark" : ""}">${escapeHtml(status)}</span>
              </div>
            </div>

            <div class="zara-post-meta">${escapeHtml(dateText)} <span class="zara-heart">♡ 0</span></div>

            <div class="zara-post-content ${content.includes("삭제된") ? "muted" : ""}">
              ${escapeHtml(content)}
            </div>
          </article>
        `;
      }).join("");
    }

    async function loadPosts() {
      try {
        const res = await fetch("/api/posts");
        if (!res.ok) throw new Error("목록 조회 실패");
        const data = await res.json();
        renderPosts(normalizePosts(data));
      } catch (error) {
        postList.innerHTML = '<div class="zara-empty-post">불러오기 실패</div>';
      }
    }

    async function submitPost() {
      const content = textarea.value.trim();

      if (!content) {
        alert("내용을 입력해주세요.");
        return;
      }

      try {
        const res = await fetch("/api/post", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            type: selectedType,
            content,
          }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          alert(data.error || "등록 실패");
          return;
        }

        textarea.value = "";
        await loadPosts();
        alert("등록 완료");
      } catch (error) {
        alert("서버 연결 오류");
      }
    }

    submitBtn.addEventListener("click", submitPost);

    updateTypeUI("건의사항");
    loadPosts();
  </script>
</body>
</html>
