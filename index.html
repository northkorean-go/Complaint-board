<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>ZARA 건의사항</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="title">ZARA 건의사항</div>
    <div class="switch">
      <button class="active">사용자 화면</button>
      <button onclick="location.href='login.html'">관리자 화면</button>
    </div>
  </div>
</header>

<main class="container">

  <!-- LEFT -->
  <section class="card">
    <div class="logo">ZARA</div>
    <h1 class="hero">SUGGESTION BOX</h1>
    <p class="desc">
      운영진도 작성자를 확인할 수 없는 익명 방식으로 운영되니 자유롭게 남겨주세요.
    </p>

    <div class="section-label">접수 유형 선택</div>

    <div class="type-grid">
      <div class="type-btn active" onclick="selectType('건의사항')">
        <h3>건의사항</h3>
        <p>부담 없이 자유롭게 건의해주세요.</p>
      </div>

      <div class="type-btn" onclick="selectType('불만사항')">
        <h3>불만사항</h3>
        <p>불편했던 점을 자유롭게 남겨주세요.</p>
      </div>
    </div>

    <div class="section-label" id="label">ZARA 건의사항</div>

    <div class="textarea-box">
      <textarea id="content" placeholder="자유롭게 건의해주세요."></textarea>
    </div>

    <div class="submit-wrap">
      <span>익명으로 접수됩니다.</span>
      <button class="submit-btn" onclick="submitPost()">등록하기</button>
    </div>
  </section>

  <!-- RIGHT -->
  <section class="card">
    <div class="board-sub">LIVE BOARD</div>
    <div class="board-title">최근 건의사항</div>

    <div id="postList">
      <div class="post">
        <div class="post-header">
          <b>NO. 3</b>
          <span class="badge">건의사항</span>
          <span class="badge dark">보류</span>
        </div>
        <div class="post-meta">31분 전</div>
        <div class="post-content">비공개 건의사항입니다.</div>
      </div>

      <div class="post">
        <div class="post-header">
          <b>NO. 2</b>
          <span class="badge dark">불만사항</span>
          <span class="badge dark">처리중</span>
        </div>
        <div class="post-meta">48분 전</div>
        <div class="post-content">비공개 건의사항입니다.</div>
      </div>
    </div>
  </section>

</main>

<script>
let currentType = "건의사항";

function selectType(type) {
  currentType = type;

  document.querySelectorAll(".type-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  event.currentTarget.classList.add("active");

  document.getElementById("label").innerText =
    type === "건의사항" ? "ZARA 건의사항" : "ZARA 불만사항";

  document.getElementById("content").placeholder =
    type === "건의사항"
      ? "자유롭게 건의해주세요."
      : "불편했던 점을 남겨주세요.";
}

async function submitPost() {
  const content = document.getElementById("content").value;

  if (!content) {
    alert("내용 입력해");
    return;
  }

  try {
    await fetch("/api/post", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        type: currentType,
        content,
      }),
    });

    alert("등록 완료");
    location.reload();
  } catch (e) {
    alert("서버 연결 오류");
  }
}
</script>

</body>
</html>
