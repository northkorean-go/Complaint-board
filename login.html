<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZARA 관리자 로그인</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-box">
      <div class="login-logo">ZARA</div>
      <div class="login-title">관리자 로그인</div>

      <form id="loginForm" class="login-form">
        <input
          type="password"
          id="password"
          placeholder="비밀번호 입력"
          required
        />
        <button type="submit" class="login-btn">로그인</button>
      </form>

      <div id="errorMsg" class="login-error"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.error || "로그인 실패";
          return;
        }

        // 로그인 성공
        location.href = "/admin.html";
      } catch (err) {
        errorMsg.textContent = "서버 연결 오류";
      }
    });
  </script>

  <style>
    .login-wrapper {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
    }

    .login-box {
      width: 360px;
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    .login-logo {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .login-title {
      font-size: 18px;
      margin-bottom: 24px;
      color: #555;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-form input {
      height: 44px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    .login-btn {
      height: 44px;
      border-radius: 10px;
      background: #000;
      color: #fff;
      font-size: 14px;
    }

    .login-error {
      margin-top: 12px;
      color: red;
      font-size: 13px;
    }
  </style>
</body>
</html>
