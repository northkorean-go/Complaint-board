<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>ZARA 관리자 로그인</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="login-page">

  <div class="login-card">
    <p class="brand">ZARA</p>
    <h2 class="login-title">관리자 로그인</h2>
    <p class="login-desc">
      관리자 전용 페이지입니다. 로그인 후 접근할 수 있습니다.
    </p>

    <form id="loginForm" class="login-form">

      <div class="field-group">
        <label>아이디</label>
        <input id="username" type="text" placeholder="아이디 입력" required />
      </div>

      <div class="field-group">
        <label>비밀번호</label>
        <input id="password" type="password" placeholder="비밀번호 입력" required />
      </div>

      <p id="loginMsg" class="error-text"></p>

      <button type="submit" class="primary-btn full">로그인</button>

    </form>

    <button class="back-btn" onclick="location.href='index.html'">
      ← 사용자 화면으로 돌아가기
    </button>

  </div>

</div>

<script>
const form = document.getElementById("loginForm");
const msg = document.getElementById("loginMsg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  msg.textContent = "";

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const result = await res.json();

    if (!res.ok || !result.success) {
      msg.textContent = result.message || "로그인 실패";
      return;
    }

    location.href = "/admin.html";

  } catch (err) {
    msg.textContent = "서버 연결 오류";
  }
});
</script>

</body>
</html>
