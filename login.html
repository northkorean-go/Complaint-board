<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZARA 관리자 로그인</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="zara-page">
      <div class="zara-card login-card">
        <div class="zara-logo-wrap">
          <div class="zara-logo">ZARA</div>
          <div class="zara-logo-sub">ADMIN LOGIN</div>
        </div>

        <div class="section-line"></div>

        <h1 class="page-title">관리자 로그인</h1>
        <p class="page-desc">등록된 건의사항은 관리자만 확인할 수 있습니다.</p>

        <label class="field-label">아이디</label>
        <input id="id" type="text" placeholder="아이디 입력" />

        <label class="field-label">비밀번호</label>
        <input id="pw" type="password" placeholder="비밀번호 입력" />

        <button type="button" class="main-btn" onclick="login()">로그인</button>

        <p id="msg" class="message"></p>

        <div class="bottom-area">
          <a href="/" class="admin-link">건의사항 페이지로 돌아가기</a>
        </div>
      </div>
    </div>

    <script>
      async function login() {
        const username = document.getElementById("id").value.trim();
        const password = document.getElementById("pw").value.trim();
        const msg = document.getElementById("msg");

        if (!username || !password) {
          msg.innerText = "아이디와 비밀번호를 입력해주세요.";
          return;
        }

        try {
          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "same-origin",
            body: JSON.stringify({ username, password }),
          });

          const data = await res.json();

          if (!res.ok) {
            msg.innerText = data.msg || "로그인 실패";
            return;
          }

          window.location.href = "/admin.html";
        } catch (e) {
          msg.innerText = "서버 연결 오류";
        }
      }
    </script>
  </body>
</html>
