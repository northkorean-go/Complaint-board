<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZARA 관리자 로그인</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <p class="brand">ZARA</p>
      <h1 class="login-title">관리자 로그인</h1>
      <p class="login-desc">
        관리자 전용 페이지입니다. 승인된 계정으로 로그인한 뒤에만 접근할 수 있습니다.
      </p>

      <form id="loginForm" class="login-form">
        <div class="input-group">
          <label for="username">아이디</label>
          <input type="text" id="username" placeholder="아이디" required />
        </div>

        <div class="input-group">
          <label for="password">비밀번호</label>
          <input type="password" id="password" placeholder="비밀번호" required />
        </div>

        <button type="submit" class="primary-btn full">로그인</button>
      </form>

      <p id="loginMessage" class="error-text"></p>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");
    const loginMessage = document.getElementById("loginMessage");

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      loginMessage.textContent = "";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ username, password }),
        });

        const result = await res.json();

        if (!res.ok || !result.success) {
          loginMessage.textContent =
            result.message || "아이디 또는 비밀번호가 올바르지 않습니다.";
          return;
        }

        location.href = "/admin.html";
      } catch (error) {
        loginMessage.textContent = "로그인 중 오류가 발생했습니다.";
      }
    });
  </script>
</body>
</html>
