<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZARA 관리자 페이지</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .comment-history {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid #ece8df;
      }

      .comment-history-title {
        font-size: 12px;
        letter-spacing: 2px;
        color: #666666;
        margin-bottom: 10px;
      }

      .comment-item {
        border: 1px solid #e8e1d6;
        background: #faf8f3;
        padding: 12px;
        margin-bottom: 10px;
      }

      .comment-item.deleted {
        background: #f3f3f3;
      }

      .comment-meta {
        font-size: 12px;
        color: #666666;
        margin-bottom: 8px;
      }

      .comment-text {
        font-size: 15px;
        line-height: 1.7;
        color: #111111;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .comment-item.deleted .comment-text {
        color: #888888;
      }

      .comment-submeta {
        font-size: 12px;
        color: #777777;
        margin-top: 8px;
      }

      .comment-delete-btn {
        margin-top: 10px;
        border: 1px solid #111111;
        background: transparent;
        color: #111111;
        padding: 8px 12px;
        font-size: 12px;
        letter-spacing: 1px;
        cursor: pointer;
      }

      .comment-delete-btn:hover {
        background: #111111;
        color: #ffffff;
      }
    </style>
  </head>
  <body class="admin-body">
    <div class="admin-shell">
      <div class="admin-top">
        <div>
          <div class="zara-logo admin-logo">ZARA</div>
          <div class="admin-subtitle">SUGGESTION MANAGEMENT</div>
          <h1 class="admin-title">건의사항 관리자</h1>
          <p class="admin-desc">
            등록된 건의사항을 확인하고 댓글을 남길 수 있습니다.
          </p>
        </div>

        <button class="logout-btn" onclick="logout()">로그아웃</button>
      </div>

      <div class="admin-divider"></div>

      <p id="msg" class="message admin-message"></p>
      <div id="list" class="post-list"></div>
    </div>

    <script>
      async function load() {
        const res = await fetch("/api/posts", {
          credentials: "same-origin",
        });

        const list = document.getElementById("list");

        if (!res.ok) {
          location.href = "/login.html";
          return;
        }

        const data = await res.json();

        if (!data.length) {
          list.innerHTML = `
            <div class="post-item empty-item">
              <div class="empty-text">등록된 건의사항이 없습니다.</div>
            </div>
          `;
          return;
        }

        let html = "";
        data.forEach((p) => {
          html += `
            <div class="post-item">
              <div class="post-head">
                <div class="post-number">NO. ${p.id}</div>
                <div class="post-date">${escapeHtml(p.date)}</div>
              </div>

              <div class="post-label">건의사항</div>
              <div class="post-content">${escapeHtml(p.content).replace(/\n/g, "<br>")}</div>

              <div class="comment-block">
                <div class="post-label">관리자 댓글 작성</div>
                <textarea
                  id="comment-${p.id}"
                  class="comment-textarea"
                  placeholder="댓글을 입력하세요."
                ></textarea>
                <div class="post-footer">
                  <button class="comment-btn" onclick="saveComment(${p.id})">댓글 저장</button>
                </div>
              </div>

              <div class="comment-history">
                <div class="comment-history-title">댓글 내역</div>
                <div id="comments-${p.id}"></div>
              </div>

              <div class="post-footer">
                <button class="delete-btn" onclick="delPost(${p.id})">건의사항 삭제</button>
              </div>
            </div>
          `;
        });

        list.innerHTML = html;

        for (const p of data) {
          await loadComments(p.id);
        }
      }

      async function saveComment(postId) {
        const textarea = document.getElementById(`comment-${postId}`);
        const content = textarea.value.trim();

        if (!content) {
          alert("댓글 내용을 입력해주세요.");
          return;
        }

        const res = await fetch("/api/comment", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ postId, content }),
        });

        const text = await res.text();
        let data = {};
        try {
          data = JSON.parse(text);
        } catch (_) {}

        if (!res.ok) {
          alert(data.msg || "댓글 저장 실패");
          return;
        }

        textarea.value = "";
        await loadComments(postId);
      }

      async function loadComments(postId) {
        const container = document.getElementById(`comments-${postId}`);
        if (!container) return;

        const res = await fetch(`/api/comments?postId=${postId}`, {
          credentials: "same-origin",
        });

        if (!res.ok) {
          container.innerHTML = `<div class="empty-text">댓글을 불러오지 못했습니다.</div>`;
          return;
        }

        const comments = await res.json();

        if (!comments.length) {
          container.innerHTML = `<div class="empty-text">등록된 댓글이 없습니다.</div>`;
          return;
        }

        let html = "";
        comments.forEach((c) => {
          html += `
            <div class="comment-item ${c.is_deleted ? "deleted" : ""}">
              <div class="comment-meta">댓글 NO. ${c.id}</div>
              <div class="comment-text">
                ${c.is_deleted ? "삭제된 댓글입니다." : escapeHtml(c.content)}
              </div>
              <div class="comment-submeta">
                ${
                  c.is_deleted && c.deleted_at
                    ? `삭제일: ${escapeHtml(c.deleted_at)}`
                    : `작성일: ${escapeHtml(c.date)}`
                }
              </div>
              ${
                c.is_deleted
                  ? ""
                  : `<button class="comment-delete-btn" onclick="deleteComment(${c.id}, ${postId})">댓글 삭제</button>`
              }
            </div>
          `;
        });

        container.innerHTML = html;
      }

      async function deleteComment(commentId, postId) {
        const ok = confirm("댓글을 삭제할까요?");
        if (!ok) return;

        const res = await fetch("/api/delete-comment", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ commentId }),
        });

        const text = await res.text();
        let data = {};
        try {
          data = JSON.parse(text);
        } catch (_) {}

        if (!res.ok) {
          alert(data.msg || "댓글 삭제 실패");
          return;
        }

        await loadComments(postId);
      }

      async function delPost(id) {
        const ok = confirm("이 건의사항을 삭제할까요?");
        if (!ok) return;

        const res = await fetch("/api/posts/" + id, {
          method: "DELETE",
          credentials: "same-origin",
        });

        if (res.ok) {
          load();
        } else {
          alert("삭제 실패");
        }
      }

      async function logout() {
        await fetch("/api/logout", {
          method: "POST",
          credentials: "same-origin",
        });
        location.href = "/login.html";
      }

      function escapeHtml(text = "") {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      load();
    </script>
  </body>
</html>
