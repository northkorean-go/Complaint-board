<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZARA 관리자 페이지</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <h1 class="topbar-title">ZARA 건의사항</h1>
      <div class="topbar-tabs">
        <button class="topbar-tab" type="button" id="goPublicBtn">사용자 화면</button>
        <button class="topbar-tab active" type="button">관리자 화면</button>
      </div>
    </div>
  </div>

  <div class="admin-shell">
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <p class="brand">ZARA</p>
        <h2 class="admin-side-title">SUGGESTION MANAGEMENT</h2>
        <p class="admin-side-desc">관리자 전용 페이지입니다.</p>

        <div id="adminPostList" class="sidebar-list"></div>
      </aside>

      <main class="admin-main">
        <div class="admin-main-grid">
          <section class="panel admin-detail-panel">
            <div class="detail-head">
              <div>
                <p class="board-eyebrow">DETAIL</p>
                <h3 class="detail-title">건의사항 상세</h3>
              </div>

              <div class="detail-head-actions">
                <span id="detailStatus" class="status-badge processing">처리중</span>
                <button id="hideBtn" class="ghost-btn">숨김 처리</button>
              </div>
            </div>

            <div class="detail-box">
              <div class="detail-box-head">
                <div class="badge-row">
                  <span id="detailNo" class="no-badge">NO. -</span>
                  <span id="detailType" class="type-badge suggestion">건의사항</span>
                </div>

                <div class="meta-row static">
                  <span id="detailDate">-</span>
                  <span id="detailLikes">♡ 0</span>
                </div>
              </div>

              <p id="detailContent" class="detail-content">선택된 항목이 없습니다.</p>
            </div>

            <div class="status-action-grid">
              <button class="ghost-btn full-width" onclick="changeStatus('processing')">처리중으로 변경</button>
              <button class="ghost-btn full-width" onclick="changeStatus('done')">완료로 변경</button>
              <button class="ghost-btn full-width" onclick="changeStatus('hold')">보류로 변경</button>
            </div>

            <div class="comment-section">
              <div class="comment-label">관리자 댓글 작성</div>
              <textarea id="commentInput" class="comment-textarea" placeholder="관리자 답변을 입력하세요."></textarea>
              <div class="comment-save-row">
                <button id="saveCommentBtn" class="primary-btn">댓글 저장</button>
              </div>
            </div>
          </section>

          <section class="admin-side-panels">
            <div class="panel side-card">
              <p class="board-eyebrow">OVERVIEW</p>
              <h3 class="side-card-title">요약</h3>
              <div id="overviewGrid" class="overview-grid"></div>
            </div>

            <div class="panel side-card">
              <p class="board-eyebrow">SEARCH & FILTER</p>
              <h3 class="side-card-title">관리 도구</h3>
              <div class="filter-grid">
                <button class="ghost-btn full-width" onclick="setFilter('all')">전체</button>
                <button class="ghost-btn full-width" onclick="setFilter('suggestion')">건의사항</button>
                <button class="ghost-btn full-width" onclick="setFilter('complaint')">불만사항</button>
                <button class="ghost-btn full-width" onclick="setFilter('processing')">처리중</button>
              </div>
            </div>

            <div class="panel side-card">
              <button id="logoutBtn" class="primary-btn full-width">로그아웃</button>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script>
    let allPosts = [];
    let currentPostId = null;
    let currentFilter = "all";

    const goPublicBtn = document.getElementById("goPublicBtn");
    const adminPostList = document.getElementById("adminPostList");
    const detailNo = document.getElementById("detailNo");
    const detailType = document.getElementById("detailType");
    const detailStatus = document.getElementById("detailStatus");
    const detailDate = document.getElementById("detailDate");
    const detailLikes = document.getElementById("detailLikes");
    const detailContent = document.getElementById("detailContent");
    const commentInput = document.getElementById("commentInput");
    const overviewGrid = document.getElementById("overviewGrid");
    const hideBtn = document.getElementById("hideBtn");
    const saveCommentBtn = document.getElementById("saveCommentBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    function typeLabel(type) {
      return type === "complaint" ? "불만사항" : "건의사항";
    }

    function typeClass(type) {
      return type === "complaint" ? "complaint" : "suggestion";
    }

    function statusLabel(status) {
      if (status === "done") return "완료";
      if (status === "hold") return "보류";
      return "처리중";
    }

    function statusClass(status) {
      if (status === "done") return "done";
      if (status === "hold") return "hold";
      return "processing";
    }

    function formatRelativeDate(dateString) {
      if (!dateString) return "-";

      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return dateString;

      const now = new Date();
      const diffMs = now - date;
      const diffMin = Math.floor(diffMs / 60000);
      const diffHour = Math.floor(diffMs / 3600000);
      const diffDay = Math.floor(diffMs / 86400000);

      if (diffMin < 1) return "방금 전";
      if (diffMin < 60) return `${diffMin}분 전`;
      if (diffHour < 24) return `${diffHour}시간 전`;
      if (diffDay < 2) return "어제";
      if (diffDay < 7) return `${diffDay}일 전`;

      return date.toLocaleDateString("ko-KR");
    }

    function getFilteredPosts() {
      if (currentFilter === "all") return allPosts;
      if (currentFilter === "suggestion" || currentFilter === "complaint") {
        return allPosts.filter((post) => post.type === currentFilter);
      }
      if (currentFilter === "processing") {
        return allPosts.filter((post) => post.status === "processing");
      }
      return allPosts;
    }

    function renderSidebar() {
      const posts = getFilteredPosts();

      if (posts.length === 0) {
        adminPostList.innerHTML = `<div class="empty-box">표시할 항목이 없습니다.</div>`;
        return;
      }

      adminPostList.innerHTML = posts.map((post) => `
        <button class="sidebar-item ${currentPostId === post.id ? "active" : ""}" onclick="selectPost(${post.id})">
          <div class="sidebar-item-top">
            <span>NO. ${post.id}</span>
            <span>${formatRelativeDate(post.date)}</span>
          </div>
          <div class="sidebar-item-text">
            ${post.deleted ? "삭제된 건의사항입니다." : "비공개 건의사항입니다."}
          </div>
        </button>
      `).join("");
    }

    function renderOverview() {
      const total = allPosts.length;
      const processing = allPosts.filter((p) => p.status === "processing").length;
      const done = allPosts.filter((p) => p.status === "done").length;
      const hold = allPosts.filter((p) => p.status === "hold").length;
      const suggestion = allPosts.filter((p) => p.type === "suggestion").length;
      const complaint = allPosts.filter((p) => p.type === "complaint").length;

      overviewGrid.innerHTML = `
        <div class="overview-item"><span>전체 건수</span><strong>${String(total).padStart(2, "0")}</strong></div>
        <div class="overview-item"><span>처리중</span><strong>${String(processing).padStart(2, "0")}</strong></div>
        <div class="overview-item"><span>건의사항</span><strong>${String(suggestion).padStart(2, "0")}</strong></div>
        <div class="overview-item"><span>불만사항</span><strong>${String(complaint).padStart(2, "0")}</strong></div>
        <div class="overview-item"><span>완료</span><strong>${String(done).padStart(2, "0")}</strong></div>
        <div class="overview-item"><span>보류</span><strong>${String(hold).padStart(2, "0")}</strong></div>
      `;
    }

    function resetDetail() {
      detailNo.textContent = "NO. -";
      detailType.textContent = "건의사항";
      detailType.className = "type-badge suggestion";
      detailStatus.textContent = "처리중";
      detailStatus.className = "status-badge processing";
      detailDate.textContent = "-";
      detailLikes.textContent = "♡ 0";
      detailContent.textContent = "선택된 항목이 없습니다.";
      commentInput.value = "";
    }

    function selectPost(id) {
      currentPostId = id;
      const post = allPosts.find((item) => item.id === id);
      if (!post) return;

      detailNo.textContent = `NO. ${post.id}`;
      detailType.textContent = typeLabel(post.type);
      detailType.className = `type-badge ${typeClass(post.type)}`;
      detailStatus.textContent = statusLabel(post.status);
      detailStatus.className = `status-badge ${statusClass(post.status)}`;
      detailDate.textContent = formatRelativeDate(post.date);
      detailLikes.textContent = `♡ ${post.likes || 0}`;
      detailContent.textContent = post.deleted ? "삭제된 건의사항입니다." : (post.content || "");
      commentInput.value = post.comment || "";

      renderSidebar();
    }

    function setFilter(filter) {
      currentFilter = filter;
      const filtered = getFilteredPosts();

      if (filtered.length > 0) {
        currentPostId = filtered[0].id;
      } else {
        currentPostId = null;
      }

      renderSidebar();

      if (currentPostId) {
        selectPost(currentPostId);
      } else {
        resetDetail();
      }
    }

    async function loadAdminPosts() {
      try {
        const meRes = await fetch("/api/me");
        const me = await meRes.json();

        if (!me.isAdmin) {
  adminPostList.innerHTML = `<div class="empty-box">로그인 세션이 확인되지 않았습니다. 다시 로그인해주세요.</div>`;
  resetDetail();
  return;
}

        const res = await fetch("/api/admin-posts");
        const posts = await res.json();

        allPosts = Array.isArray(posts) ? posts : [];
        renderOverview();

        const filtered = getFilteredPosts();
        if (filtered.length > 0) {
          currentPostId = filtered[0].id;
          renderSidebar();
          selectPost(currentPostId);
        } else {
          renderSidebar();
          resetDetail();
        }
      } catch (error) {
        adminPostList.innerHTML = `<div class="empty-box">목록을 불러오지 못했습니다.</div>`;
      }
    }

    async function changeStatus(status) {
      if (!currentPostId) {
        alert("선택된 항목이 없습니다.");
        return;
      }

      try {
        const res = await fetch("/api/status", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            id: currentPostId,
            status
          })
        });

        const result = await res.json();

        if (!res.ok || !result.success) {
          alert(result.message || "상태 변경 실패");
          return;
        }

        await loadAdminPosts();
      } catch (error) {
        alert("상태 변경 중 오류가 발생했습니다.");
      }
    }

    window.changeStatus = changeStatus;
    window.selectPost = selectPost;
    window.setFilter = setFilter;

    saveCommentBtn.addEventListener("click", async () => {
  if (!currentPostId) {
    alert("선택된 항목이 없습니다.");
    return;
  }

  try {
    const res = await fetch("/api/comment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        id: currentPostId,
        comment: commentInput.value
      })
    });

    const text = await res.text();
    let result = {};

    try {
      result = JSON.parse(text);
    } catch {
      alert(`댓글 저장 실패: ${text}`);
      return;
    }

    if (!res.ok || !result.success) {
      alert(result.message || "댓글 저장 실패");
      return;
    }

    alert(result.message || "댓글이 저장되었습니다.");
    await loadAdminPosts();
  } catch (error) {
    alert(`댓글 저장 중 오류: ${error.message}`);
  }
});

    hideBtn.addEventListener("click", async () => {
      if (!currentPostId) {
        alert("선택된 항목이 없습니다.");
        return;
      }

      if (!confirm("이 게시글을 숨김 처리할까요?")) {
        return;
      }

      try {
        const res = await fetch("/api/delete", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ id: currentPostId })
        });

        const result = await res.json();

        if (!res.ok || !result.success) {
          alert(result.message || "숨김 처리 실패");
          return;
        }

        await loadAdminPosts();
      } catch (error) {
        alert("숨김 처리 중 오류가 발생했습니다.");
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await fetch("/api/logout", {
          method: "POST"
        });
        location.href = "/";
      } catch (error) {
        alert("로그아웃 중 오류가 발생했습니다.");
      }
    });

    goPublicBtn.addEventListener("click", () => {
      location.href = "/";
    });

    loadAdminPosts();
  </script>
</body>
</html>
